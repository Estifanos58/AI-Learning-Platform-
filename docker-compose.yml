services:
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c 'cat < /dev/null > /dev/tcp/localhost/9092'"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5432:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GRPC_SERVER_PORT: 9090
      APP_GRPC_AUTH_SERVICE_SECRET: change-me-shared-secret
      APP_KAFKA_TOPIC_USER_REGISTERED: user.registered.v1
      APP_KAFKA_TOPIC_USER_EMAIL_VERIFICATION: user.email.verification.v1

  profile-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: user_profile_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - profile_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_profile_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  file-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: file_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - file_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d file_service_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-profile-service:
    build:
      context: .
      dockerfile: user-profile-service/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      profile-postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://profile-postgres:5432/user_profile_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GRPC_SERVER_PORT: 9091
      APP_GRPC_PROFILE_SERVICE_SECRET: change-me-shared-secret
      APP_KAFKA_TOPIC_USER_REGISTERED: user.registered.v1
      APP_KAFKA_TOPIC_USER_REGISTERED_DLT: user.registered.dlt
    ports:
      - "9091:9091"

  file-service:
    build:
      context: .
      dockerfile: file-service/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      file-postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://file-postgres:5432/file_service_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GRPC_SERVER_PORT: 9092
      FILE_STORAGE_ROOT_PATH: /data
      APP_GRPC_FILE_SERVICE_SECRET: change-me-shared-secret
      APP_KAFKA_FILE_EVENTS_ENABLED: "true"
      APP_KAFKA_TOPIC_FILE_UPLOADED: file.uploaded.v1
      APP_KAFKA_TOPIC_FILE_UPLOADED_V2: file.uploaded.v2
      APP_KAFKA_TOPIC_FILE_DELETED: file.deleted.v1
    volumes:
      - file-storage:/data
    ports:
      - "9094:9092"

  redis:
    image: redis:7.2-alpine3.19
    ports:
      - "6379:6379"

  chat-postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: chat_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - chat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chat_service_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  chat-redis:
    image: redis:7.2-alpine3.19
    ports:
      - "6380:6379"

  chat-service:
    build:
      context: .
      dockerfile: chat-service/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
      chat-postgres:
        condition: service_healthy
      chat-redis:
        condition: service_started
      file-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://chat-postgres:5432/chat_service_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: chat-redis
      SPRING_DATA_REDIS_PORT: 6379
      GRPC_SERVER_PORT: 9095
      GRPC_FILE_ADDRESS: static://file-service:9092
      APP_GRPC_CHAT_SERVICE_SECRET: change-me-shared-secret
      APP_GRPC_FILE_SERVICE_SECRET: change-me-shared-secret
      APP_KAFKA_TOPIC_AI_MESSAGE: ai.message.requested
      APP_KAFKA_TOPIC_AI_MESSAGE_V2: ai.message.requested.v2
      APP_KAFKA_TOPIC_AI_MESSAGE_CHUNK: ai.message.chunk.v1
      APP_KAFKA_TOPIC_AI_MESSAGE_COMPLETED: ai.message.completed.v1
      APP_KAFKA_TOPIC_AI_MESSAGE_FAILED: ai.message.failed.v1
      APP_KAFKA_TOPIC_AI_MESSAGE_CANCELLED: ai.message.cancelled.v1
    ports:
      - "9095:9095"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    depends_on:
      auth-service:
        condition: service_started
      user-profile-service:
        condition: service_started
      file-service:
        condition: service_started
      chat-service:
        condition: service_started
      redis:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      GRPC_AUTH_ADDRESS: static://auth-service:9090
      GRPC_PROFILE_ADDRESS: static://user-profile-service:9091
      GRPC_FILE_ADDRESS: static://file-service:9092
      GRPC_CHAT_ADDRESS: static://chat-service:9095
      APP_GRPC_AUTH_SERVICE_SECRET: change-me-shared-secret
      APP_GRPC_PROFILE_SERVICE_SECRET: change-me-shared-secret
      APP_GRPC_FILE_SERVICE_SECRET: change-me-shared-secret
      APP_GRPC_CHAT_SERVICE_SECRET: change-me-shared-secret
    ports:
      - "8080:8080"

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    env_file:
      - ./notification-service/.env
    environment:
      kafka_bootstrap_servers: kafka:29092
      kafka_group_id: notification-service-v1
      kafka_topic_email_verification: user.email.verification.v1
      kafka_topic_email_failed: notification.email.failed.v1
      smtp_host: smtp.gmail.com
      smtp_port: 587
    ports:
      - "8086:8086"

  rag-service:
    build:
      context: .
      dockerfile: rag-service/Dockerfile
    profiles: ["rag"]
    depends_on:
      kafka:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      RAG_HOST: 0.0.0.0
      RAG_PORT: 8087
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_GROUP_ID: rag-service-v1
      KAFKA_TOPIC_FILE_UPLOADED_V2: file.uploaded.v2
      KAFKA_TOPIC_FILE_DELETED_V1: file.deleted.v1
      KAFKA_TOPIC_AI_MESSAGE_REQUESTED_V2: ai.message.requested.v2
      KAFKA_TOPIC_AI_MESSAGE_CANCELLED_V1: ai.message.cancelled.v1
      KAFKA_TOPIC_AI_MESSAGE_CHUNK_V1: ai.message.chunk.v1
      KAFKA_TOPIC_AI_MESSAGE_COMPLETED_V1: ai.message.completed.v1
      KAFKA_TOPIC_AI_MESSAGE_FAILED_V1: ai.message.failed.v1
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: rag_chunks_prod
      TEI_BASE_URL: http://tei:80
      FILE_STORAGE_ROOT_PATH: /data
      GRPC_FILE_SERVICE_ADDRESS: file-service:9092
      APP_GRPC_SERVICE_SECRET: change-me-shared-secret
      APP_ENV: production
      RAG_DATABASE_URL: postgresql+asyncpg://postgres:postgres@rag-postgres:5432/rag_db
    volumes:
      - file-storage:/data:ro
    ports:
      - "8087:8087"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8087/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  rag-postgres:
    image: postgres:15-alpine
    profiles: ["rag"]
    environment:
      POSTGRES_DB: rag_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - rag_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    profiles: ["rag"]
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    profiles: ["rag"]
    command: --model-id BAAI/bge-large-en-v1.5 --port 80
    ports:
      - "8088:80"
    volumes:
      - tei_models:/data
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}

volumes:
  auth_postgres_data:
  profile_postgres_data:
  file_postgres_data:
  chat_postgres_data:
  rag_postgres_data:
  file-storage:
  qdrant_data:
  tei_models:
