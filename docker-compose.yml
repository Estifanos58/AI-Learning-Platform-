services:
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: platform-kafka
    environment:
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    ports:
      - "9092:9092"

  postgres:
    image: postgres:15
    container_name: auth-postgres
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    ports:
      - "5432:5432"
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    depends_on:
      kafka:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      SPRING_DATASOURCE_USERNAME: auth_user
      SPRING_DATASOURCE_PASSWORD: auth_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GRPC_SERVER_PORT: 9090
      APP_GRPC_AUTH_SERVICE_SECRET: change-me-shared-secret
      APP_KAFKA_TOPIC_USER_REGISTERED: user.registered.v1
      APP_KAFKA_TOPIC_USER_EMAIL_VERIFICATION: user.email.verification.v1

  profile-postgres:
    image: postgres:15-alpine
    container_name: profile-postgres
    environment:
      POSTGRES_DB: user_profile_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - profile_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_profile_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  file-postgres:
    image: postgres:15-alpine
    container_name: file-postgres
    environment:
      POSTGRES_DB: file_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - file_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d file_service_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-profile-service:
    build:
      context: .
      dockerfile: user-profile-service/Dockerfile
    container_name: user-profile-service
    depends_on:
      kafka:
        condition: service_started
      profile-postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://profile-postgres:5432/user_profile_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GRPC_SERVER_PORT: 9091
      APP_GRPC_PROFILE_SERVICE_SECRET: change-me-shared-secret
      APP_KAFKA_TOPIC_USER_REGISTERED: user.registered.v1
      APP_KAFKA_TOPIC_USER_REGISTERED_DLT: user.registered.dlt
    ports:
      - "9091:9091"

  file-service:
    build:
      context: .
      dockerfile: file-service/Dockerfile
    container_name: file-service
    depends_on:
      kafka:
        condition: service_started
      file-postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://file-postgres:5432/file_service_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GRPC_SERVER_PORT: 9092
      FILE_STORAGE_ROOT_PATH: /data
      APP_GRPC_FILE_SERVICE_SECRET: change-me-shared-secret
    volumes:
      - file-storage:/data
    ports:
      - "9094:9092"

  redis:
    image: redis:7.2-alpine3.19
    container_name: auth-redis
    ports:
      - "6379:6379"

  chat-postgres:
    image: postgres:15-alpine
    container_name: chat-postgres
    environment:
      POSTGRES_DB: chat_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - chat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chat_service_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  chat-redis:
    image: redis:7.2-alpine3.19
    container_name: chat-redis
    ports:
      - "6380:6379"

  chat-service:
    build:
      context: .
      dockerfile: chat-service/Dockerfile
    container_name: chat-service
    depends_on:
      kafka:
        condition: service_started
      chat-postgres:
        condition: service_healthy
      chat-redis:
        condition: service_started
      file-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://chat-postgres:5432/chat_service_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: chat-redis
      SPRING_DATA_REDIS_PORT: 6379
      GRPC_SERVER_PORT: 9095
      GRPC_FILE_ADDRESS: static://file-service:9092
      APP_GRPC_CHAT_SERVICE_SECRET: change-me-shared-secret
      APP_GRPC_FILE_SERVICE_SECRET: change-me-shared-secret
      APP_KAFKA_TOPIC_AI_MESSAGE: ai.message.requested
    ports:
      - "9095:9095"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    depends_on:
      auth-service:
        condition: service_started
      user-profile-service:
        condition: service_started
      file-service:
        condition: service_started
      chat-service:
        condition: service_started
      redis:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      GRPC_AUTH_ADDRESS: static://auth-service:9090
      GRPC_PROFILE_ADDRESS: static://user-profile-service:9091
      GRPC_FILE_ADDRESS: static://file-service:9092
      GRPC_CHAT_ADDRESS: static://chat-service:9095
      APP_GRPC_AUTH_SERVICE_SECRET: change-me-shared-secret
      APP_GRPC_PROFILE_SERVICE_SECRET: change-me-shared-secret
      APP_GRPC_FILE_SERVICE_SECRET: change-me-shared-secret
      APP_GRPC_CHAT_SERVICE_SECRET: change-me-shared-secret
    ports:
      - "8080:8080"

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    depends_on:
      kafka:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_GROUP_ID: notification-service-v1
      KAFKA_TOPIC_EMAIL_VERIFICATION: user.email.verification.v1
      KAFKA_TOPIC_EMAIL_FAILED: notification.email.failed.v1
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@aiplatform.local}
    ports:
      - "8086:8086"

  rag-service:
    image: alpine:3.20
    container_name: rag-service
    command: ["sh", "-c", "sleep infinity"]
    profiles: ["rag"]
    volumes:
      - file-storage:/data:ro

volumes:
  auth_postgres_data:
  profile_postgres_data:
  file_postgres_data:
  chat_postgres_data:
  file-storage:
