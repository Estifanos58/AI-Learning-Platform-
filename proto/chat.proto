syntax = "proto3";

package chat.v1;

option java_multiple_files = true;
option java_package = "com.aiplatform.chat.proto";
option java_outer_classname = "ChatProto";

service ChatService {
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  rpc GetChatroom(GetChatroomRequest) returns (ChatroomResponse);
  rpc ListChatrooms(ListChatroomsRequest) returns (ListChatroomsResponse);
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse);
  rpc SendTypingIndicator(TypingIndicatorRequest) returns (SimpleResponse);
}

message SendMessageRequest {
  string user_id = 1;
  string other_user_id = 2;
  string chatroom_id = 3;
  string ai_model_id = 4;
  string content = 5;
  string file_id = 6;
  bytes file_content = 7;
  string file_original_name = 8;
  string file_content_type = 9;
}

message SendMessageResponse {
  MessageDto message = 1;
  string chatroom_id = 2;
  bool is_new_chatroom = 3;
}

message GetChatroomRequest {
  string chatroom_id = 1;
}

message ListChatroomsRequest {
  string user_id = 1;
  int32 page = 2;
  int32 size = 3;
}

message ListMessagesRequest {
  string chatroom_id = 1;
  string user_id = 2;
  int32 page = 3;
  int32 size = 4;
}

message TypingIndicatorRequest {
  string user_id = 1;
  string chatroom_id = 2;
  bool is_typing = 3;
}

message MessageDto {
  string id = 1;
  string chatroom_id = 2;
  string sender_user_id = 3;
  string ai_model_id = 4;
  string content = 5;
  string file_id = 6;
  string created_at = 7;
}

message ChatroomResponse {
  string id = 1;
  string type = 2;
  repeated string member_ids = 3;
  string created_at = 4;
}

message ListChatroomsResponse {
  repeated ChatroomResponse chatrooms = 1;
  int64 total = 2;
}

message ListMessagesResponse {
  repeated MessageDto messages = 1;
  int64 total = 2;
}

message SimpleResponse {
  string message = 1;
}
