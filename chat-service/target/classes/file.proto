syntax = "proto3";

package file.v1;

option java_multiple_files = true;
option java_package = "com.aiplatform.file.proto";
option java_outer_classname = "FileProto";

enum FileType {
  PROFILE_IMAGE = 0;
  DOCUMENT = 1;
}

service FileService {
  rpc CreateFolder(CreateFolderRequest) returns (FolderResponse);
  rpc UpdateFolder(UpdateFolderRequest) returns (FolderResponse);
  rpc DeleteFolder(DeleteFolderRequest) returns (SimpleResponse);
  rpc ShareFolder(ShareFolderRequest) returns (SimpleResponse);
  rpc UnshareFolder(UnshareFolderRequest) returns (SimpleResponse);
  rpc ListMyFolders(ListMyFoldersRequest) returns (ListFoldersResponse);
  rpc ListSharedFolders(ListSharedFoldersRequest) returns (ListFoldersResponse);

  rpc UploadFile(UploadFileRequest) returns (FileResponse);
  rpc GetFileMetadata(GetFileRequest) returns (FileResponse);
  rpc DeleteFile(DeleteFileRequest) returns (SimpleResponse);
  rpc ShareFile(ShareFileRequest) returns (SimpleResponse);
  rpc UnshareFile(UnshareFileRequest) returns (SimpleResponse);
  rpc UpdateFileMetadata(UpdateFileMetadataRequest) returns (FileResponse);
  rpc ListMyFiles(ListMyFilesRequest) returns (ListFilesResponse);
  rpc ListSharedWithMe(ListSharedWithMeRequest) returns (ListFilesResponse);
  rpc GetFilePath(GetFilePathRequest) returns (FilePathResponse);
}

message CreateFolderRequest {
  string name = 1;
  string parent_id = 2;
}

message UpdateFolderRequest {
  string folder_id = 1;
  string name = 2;
}

message DeleteFolderRequest {
  string folder_id = 1;
}

message ShareFolderRequest {
  string folder_id = 1;
  string shared_with_user_id = 2;
}

message UnshareFolderRequest {
  string folder_id = 1;
  string shared_with_user_id = 2;
}

message ListMyFoldersRequest {
  int32 page = 1;
  int32 size = 2;
}

message ListSharedFoldersRequest {
  int32 page = 1;
  int32 size = 2;
}

message FolderResponse {
  string id = 1;
  string owner_id = 2;
  string name = 3;
  string parent_id = 4;
  bool deleted = 5;
  string created_at = 6;
  string updated_at = 7;
}

message ListFoldersResponse {
  repeated FolderResponse folders = 1;
  int64 total = 2;
}

message UploadFileRequest {
  FileType file_type = 1;
  string original_name = 2;
  string content_type = 3;
  bytes content = 4;
  bool is_shareable = 5;
  string folder_id = 6;
}

message GetFileRequest {
  string file_id = 1;
}

message DeleteFileRequest {
  string file_id = 1;
}

message ShareFileRequest {
  string file_id = 1;
  string shared_with_user_id = 2;
}

message UnshareFileRequest {
  string file_id = 1;
  string shared_with_user_id = 2;
}

message UpdateFileMetadataRequest {
  string file_id = 1;
  bool is_shareable = 2;
}

message ListMyFilesRequest {
  int32 page = 1;
  int32 size = 2;
  FileType file_type = 3;
  bool include_deleted = 4;
  bool filter_by_type = 5;
}

message ListSharedWithMeRequest {
  int32 page = 1;
  int32 size = 2;
}

message GetFilePathRequest {
  string file_id = 1;
}

message FileResponse {
  string id = 1;
  string owner_id = 2;
  string folder_id = 13;
  FileType file_type = 3;
  string original_name = 4;
  string stored_name = 5;
  string content_type = 6;
  int64 file_size = 7;
  string storage_path = 8;
  bool is_shareable = 9;
  bool deleted = 10;
  string created_at = 11;
  string updated_at = 12;
}

message ListFilesResponse {
  repeated FileResponse files = 1;
  int64 total = 2;
}

message FilePathResponse {
  string file_id = 1;
  string absolute_path = 2;
}

message SimpleResponse {
  string message = 1;
}
