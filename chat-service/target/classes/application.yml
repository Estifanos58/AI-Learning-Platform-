server:
  port: ${SERVER_PORT:9094}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9094}

spring:
  application:
    name: chat-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/chat_service_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  grpc:
    chat:
      service-secret: ${APP_GRPC_CHAT_SERVICE_SECRET:change-me-shared-secret}
  kafka:
    chat:
      ai-requested-topic: ${APP_KAFKA_TOPIC_CHAT_AI_REQUESTED:chat.message.ai_requested.v1}
