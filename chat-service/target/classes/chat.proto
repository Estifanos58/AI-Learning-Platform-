syntax = "proto3";

package chat.v1;

option java_multiple_files = true;
option java_package = "com.aiplatform.chat.proto";
option java_outer_classname = "ChatProto";

enum ChatroomUserRole {
  MEMBER = 0;
  ADMIN = 1;
  AI_MODEL = 2;
}

service ChatService {
  rpc CreateOrGetDirectChat(CreateDirectChatRequest) returns (ChatroomResponse);
  rpc CreateGroupChat(CreateGroupChatRequest) returns (ChatroomResponse);
  rpc SendMessage(SendMessageRequest) returns (MessageResponse);
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse);
  rpc AddMember(AddMemberRequest) returns (SimpleResponse);
  rpc RemoveMember(RemoveMemberRequest) returns (SimpleResponse);
  rpc MarkAsRead(MarkAsReadRequest) returns (SimpleResponse);
  rpc GetMyChatrooms(GetMyChatroomsRequest) returns (ListChatroomsResponse);
  rpc AddAiModelToChat(AddAiModelRequest) returns (SimpleResponse);
  rpc TypingEvent(TypingRequest) returns (SimpleResponse);
}

message CreateDirectChatRequest {
  string other_user_id = 1;
}

message CreateGroupChatRequest {
  string name = 1;
  string avatar_url = 2;
  repeated string member_user_ids = 3;
}

message SendMessageRequest {
  string chatroom_id = 1;
  string content = 2;
  string image_url = 3;
  string ai_model_id = 4;
}

message ListMessagesRequest {
  string chatroom_id = 1;
  int32 page = 2;
  int32 size = 3;
}

message AddMemberRequest {
  string chatroom_id = 1;
  string user_id = 2;
  ChatroomUserRole role = 3;
}

message RemoveMemberRequest {
  string chatroom_id = 1;
  string user_id = 2;
}

message MarkAsReadRequest {
  string chatroom_id = 1;
}

message GetMyChatroomsRequest {
  int32 page = 1;
  int32 size = 2;
}

message AddAiModelRequest {
  string chatroom_id = 1;
  string ai_model_id = 2;
}

message TypingRequest {
  string chatroom_id = 1;
  bool typing = 2;
}

message ChatroomResponse {
  string id = 1;
  string name = 2;
  bool is_group = 3;
  string avatar_url = 4;
  string created_by_id = 5;
  string created_at = 6;
  string updated_at = 7;
}

message MessageResponse {
  string id = 1;
  string content = 2;
  string image_url = 3;
  string user_id = 4;
  string chatroom_id = 5;
  string ai_model_id = 6;
  bool is_edited = 7;
  string created_at = 8;
  string updated_at = 9;
}

message ListMessagesResponse {
  repeated MessageResponse messages = 1;
  int64 total = 2;
}

message ListChatroomsResponse {
  repeated ChatroomResponse chatrooms = 1;
  int64 total = 2;
}

message SimpleResponse {
  string message = 1;
}
