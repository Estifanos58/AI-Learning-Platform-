server:
  port: ${SERVER_PORT:9093}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9093}

spring:
  application:
    name: file-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/file_service_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info

file:
  storage:
    root-path: ${FILE_STORAGE_ROOT_PATH:/data}
    max-size-mb: ${FILE_STORAGE_MAX_SIZE_MB:50}

app:
  grpc:
    file:
      service-secret: ${APP_GRPC_FILE_SERVICE_SECRET:change-me-shared-secret}
  kafka:
    file-events:
      enabled: ${APP_KAFKA_FILE_EVENTS_ENABLED:false}
      uploaded-topic: ${APP_KAFKA_TOPIC_FILE_UPLOADED:file.uploaded.v1}
      deleted-topic: ${APP_KAFKA_TOPIC_FILE_DELETED:file.deleted.v1}
      folder-created-topic: ${APP_KAFKA_TOPIC_FOLDER_CREATED:folder.created.v1}
      folder-deleted-topic: ${APP_KAFKA_TOPIC_FOLDER_DELETED:folder.deleted.v1}
      folder-shared-topic: ${APP_KAFKA_TOPIC_FOLDER_SHARED:folder.shared.v1}
