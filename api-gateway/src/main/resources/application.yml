server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: auth-signup-rate-limited
          uri: forward:/
          predicates:
            - Path=/api/auth/signup
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: '#{@ipRateLimitKeyResolver}'
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 5
            - RewritePath=/api/auth/signup, /api/internal/auth/signup
        - id: auth-login-rate-limited
          uri: forward:/
          predicates:
            - Path=/api/auth/login
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: '#{@ipRateLimitKeyResolver}'
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 10
            - RewritePath=/api/auth/login, /api/internal/auth/login
        - id: auth-resend-rate-limited
          uri: forward:/
          predicates:
            - Path=/api/auth/resend-verification
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: '#{@ipRateLimitKeyResolver}'
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 3
                redis-rate-limiter.requestedTokens: 1200
            - RewritePath=/api/auth/resend-verification, /api/internal/auth/resend-verification
        - id: auth-verify-rate-limited
          uri: forward:/
          predicates:
            - Path=/api/auth/verify-email
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: '#{@ipRateLimitKeyResolver}'
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
            - RewritePath=/api/auth/verify-email, /api/internal/auth/verify-email
        - id: auth-default-rate-limited
          uri: forward:/
          predicates:
            - Path=/api/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: '#{@ipRateLimitKeyResolver}'
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 120
            - RewritePath=/api/auth/?(?<segment>.*), /api/internal/auth/${segment}
        - id: profile-route
          uri: forward:/
          predicates:
            - Path=/api/profile/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: '#{@ipRateLimitKeyResolver}'
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 120
            - RewritePath=/api/profile/?(?<segment>.*), /api/internal/profile/${segment}
        - id: file-route
          uri: forward:/
          predicates:
            - Path=/api/files/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: '#{@ipRateLimitKeyResolver}'
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 120
            - RewritePath=/api/files/?(?<segment>.*), /api/internal/files/${segment}
        - id: chat-route
          uri: forward:/
          predicates:
            - Path=/api/chat/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: '#{@ipRateLimitKeyResolver}'
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 120
            - RewritePath=/api/chat/?(?<segment>.*), /api/internal/chat/${segment}
        - id: chat-ai-messages-rate-limited
          uri: forward:/
          predicates:
            - Path=/api/chat/messages
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: '#{@ipRateLimitKeyResolver}'
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
            - RewritePath=/api/chat/?(?<segment>.*), /api/internal/chat/${segment}
        - id: chat-ai-stream-rate-limited
          uri: forward:/
          predicates:
            - Path=/api/chat/messages/*/stream
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: '#{@ipRateLimitKeyResolver}'
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
            - RewritePath=/api/chat/?(?<segment>.*), /api/internal/chat/${segment}
        - id: chat-ai-cancel-rate-limited
          uri: forward:/
          predicates:
            - Path=/api/chat/messages/*/cancel
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: '#{@ipRateLimitKeyResolver}'
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 30
            - RewritePath=/api/chat/?(?<segment>.*), /api/internal/chat/${segment}
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${GATEWAY_ALLOWED_ORIGINS:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Content-Type
              - Authorization
              - X-Correlation-ID
            allowCredentials: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  codec:
    max-in-memory-size: ${SPRING_CODEC_MAX_IN_MEMORY_SIZE:314572800}
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:300MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:300MB}

grpc:
  client:
    auth-service:
      address: ${GRPC_AUTH_ADDRESS:static://localhost:9090}  # in docker change the localhost to auth-service
      negotiationType: ${GRPC_AUTH_NEGOTIATION:PLAINTEXT}
    profile-service:
      address: ${GRPC_PROFILE_ADDRESS:static://localhost:9091}
      negotiationType: ${GRPC_PROFILE_NEGOTIATION:PLAINTEXT}
    file-service:
      address: ${GRPC_FILE_ADDRESS:static://localhost:9093}
      negotiationType: ${GRPC_FILE_NEGOTIATION:PLAINTEXT}
      max-inbound-message-size: ${GRPC_FILE_MAX_INBOUND_MESSAGE_SIZE:6291456}
    chat-service:
      address: ${GRPC_CHAT_ADDRESS:static://localhost:9095}
      negotiationType: ${GRPC_CHAT_NEGOTIATION:PLAINTEXT}

app:
  jwt:
    issuer: ${APP_JWT_ISSUER:ai-learning-platform-auth}
    public-key-location: ${APP_JWT_PUBLIC_KEY_LOCATION:classpath:keys/public_key.pem}
  grpc:
    auth:
      service-secret: ${APP_GRPC_AUTH_SERVICE_SECRET:change-me-shared-secret}
    profile:
      service-secret: ${APP_GRPC_PROFILE_SERVICE_SECRET:change-me-shared-secret}
    file:
      service-secret: ${APP_GRPC_FILE_SERVICE_SECRET:change-me-shared-secret}
    chat:
      service-secret: ${APP_GRPC_CHAT_SERVICE_SECRET:change-me-shared-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info
