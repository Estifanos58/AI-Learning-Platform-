server:
  port: ${SERVER_PORT:9091}

grpc:
  server:
    port: ${GRPC_SERVER_PORT:9091}

spring:
  application:
    name: user-profile-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/user_profile_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: user-profile-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  grpc:
    profile:
      service-secret: ${APP_GRPC_PROFILE_SERVICE_SECRET:change-me-shared-secret}
  kafka:
    topics:
      user-registered: ${APP_KAFKA_TOPIC_USER_REGISTERED:user.registered.v1}
      user-registered-dlt: ${APP_KAFKA_TOPIC_USER_REGISTERED_DLT:user.registered.dlt}
